<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZeptAI — Login / Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/auth.css" />
  <link rel="manifest" href="/static/manifest.json" />

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="/static/firebase-config.js"></script>
  <script src="/static/firebase-service.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-logo">
    <a href="/"><img src="/static/logo.png" alt="ZeptAI" /></a>
    <p>AI Patient Intake Assistant</p>
  </div>

  <div class="auth-card">
    <div id="authBanner" class="auth-banner"></div>

    <!-- Tabs: Login | Sign Up -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Log In</button>
      <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         LOGIN PANEL
         ═══════════════════════════════════════════════════ -->
    <div id="loginPanel">
      <div class="method-tabs">
        <button class="method-tab active" id="mTabEmail" onclick="switchMethod('email')">📧 Email</button>
        <button class="method-tab"        id="mTabPhone" onclick="switchMethod('phone')">📱 Mobile OTP</button>
      </div>

      <!-- Email login -->
      <div id="emailLoginSection">
        <div class="auth-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
            <span class="form-error" id="loginEmailErr"></span>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" />
            <span class="form-error" id="loginPassErr"></span>
          </div>
          <button class="btn-auth" id="btnEmailLogin" onclick="loginWithEmail()">
            <span>Log In</span><div class="spinner" id="spinEmailLogin"></div>
          </button>
        </div>
      </div>

      <!-- Phone OTP login -->
      <div id="phoneLoginSection" class="hidden">
        <div class="auth-form" id="phoneStep1Form">
          <div class="form-group">
            <label>Mobile Number</label>
            <div class="phone-row">
              <input type="text" class="phone-code" id="loginCountryCode" value="+91" maxlength="5" />
              <input type="tel" id="loginPhone" placeholder="9876543210" autocomplete="tel" style="flex:1" />
            </div>
            <span class="form-error" id="loginPhoneErr"></span>
          </div>
          <div id="recaptcha-container"></div>
          <button class="btn-auth" id="btnSendOtp" onclick="sendOTP()">
            <span>Send OTP</span><div class="spinner" id="spinSendOtp"></div>
          </button>
        </div>
        <div class="auth-form hidden" id="phoneStep2Form">
          <p class="otp-hint" id="otpHint">Enter the 6-digit OTP sent to your mobile number.</p>
          <div class="form-group">
            <label>OTP</label>
            <input type="text" id="otpInput" placeholder="123456" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
            <span class="form-error" id="otpErr"></span>
          </div>
          <button class="btn-auth" id="btnVerifyOtp" onclick="verifyOTP()">
            <span>Verify OTP</span><div class="spinner" id="spinVerifyOtp"></div>
          </button>
          <button class="btn-google" style="margin-top:6px" onclick="resetPhoneFlow()">← Change Number</button>
        </div>
      </div>

      <div class="auth-divider">or</div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         SIGNUP PANEL
         ═══════════════════════════════════════════════════ -->
    <div id="signupPanel" class="hidden">
      <div class="auth-form">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="signupName" placeholder="e.g. Rahul Sharma" autocomplete="name" />
          <span class="form-error" id="signupNameErr"></span>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
          <span class="form-error" id="signupEmailErr"></span>
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" id="signupPassword" placeholder="Min 8 characters" autocomplete="new-password" />
          <span class="form-error" id="signupPassErr"></span>
        </div>
        <div class="form-group">
          <label>Mobile Number (for patient identity)</label>
          <div class="phone-row">
            <input type="text" class="phone-code" id="signupCountryCode" value="+91" maxlength="5" />
            <input type="tel" id="signupPhone" placeholder="9876543210" autocomplete="tel" style="flex:1" />
          </div>
          <span class="form-error" id="signupPhoneErr"></span>
        </div>
        <button class="btn-auth" id="btnSignup" onclick="signupWithEmail()">
          <span>Create Account</span><div class="spinner" id="spinSignup"></div>
        </button>
      </div>

      <div class="auth-divider">or</div>
      <button class="btn-google" onclick="loginWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </button>
    </div>

    <!-- Complete mobile number after Google signup -->
    <div id="phoneCompletePanel" class="hidden">
      <p class="otp-hint">Almost there! Please add your mobile number to complete your patient profile.</p>
      <div class="auth-form">
        <div class="form-group">
          <label>Mobile Number *</label>
          <div class="phone-row">
            <input type="text" class="phone-code" id="gcCountryCode" value="+91" maxlength="5" />
            <input type="tel" id="gcPhone" placeholder="9876543210" autocomplete="tel" style="flex:1" />
          </div>
          <span class="form-error" id="gcPhoneErr"></span>
        </div>
        <button class="btn-auth" id="btnSavePhone" onclick="saveGooglePhone()">
          <span>Continue</span><div class="spinner" id="spinSavePhone"></div>
        </button>
        <button class="btn-google" style="margin-top:6px" onclick="skipPhone()">Skip for now</button>
      </div>
    </div>
  </div>

  <p class="auth-footer">
    By continuing, you agree to ZeptAI's terms of service.<br/>
    <a href="/">← Back to Home</a>
  </p>
</div>

<script src="/static/auth.js"></script>
</body>
</html>
